syntax = "proto3";

package employee;

option go_package = "github.com/exbanka/backend/shared/pb/employee";

message Employee {
  int64  id              = 1;
  string ime             = 2;
  string prezime         = 3;
  string datum_rodjenja  = 4;
  string pol             = 5;
  string email           = 6;
  string broj_telefona   = 7;
  string adresa          = 8;
  string username        = 9;
  string pozicija        = 10;
  string departman       = 11;
  bool   aktivan         = 12;
  repeated string dozvole = 13;
}

// password is intentionally excluded — never returned over the API

message GetAllEmployeesRequest {}

message GetAllEmployeesResponse {
  repeated Employee employees = 1;
}

message SearchEmployeesRequest {
  string email    = 1;
  string ime      = 2;
  string prezime  = 3;
  string pozicija = 4;
}

message SearchEmployeesResponse {
  repeated Employee employees = 1;
}

message GetEmployeeCredentialsRequest {
  string username = 1;
}

message GetEmployeeCredentialsResponse {
  int64           id            = 1;
  string          password_hash = 2;
  repeated string dozvole       = 3;
  bool            aktivan       = 4;
}

message CreateEmployeeRequest {
  string ime            = 1;
  string prezime        = 2;
  string datum_rodjenja = 3;
  string pol            = 4;
  string email          = 5;
  string broj_telefona  = 6;
  string adresa         = 7;
  string username       = 8;
  string pozicija       = 9;
  string departman      = 10;
}

message CreateEmployeeResponse {
  Employee employee = 1;
}

message GetEmployeeByIdRequest {
  int64 id = 1;
}

message GetEmployeeByIdResponse {
  Employee employee = 1;
}

service EmployeeService {
  rpc GetAllEmployees(GetAllEmployeesRequest) returns (GetAllEmployeesResponse);
  rpc SearchEmployees(SearchEmployeesRequest) returns (SearchEmployeesResponse);
  rpc GetEmployeeCredentials(GetEmployeeCredentialsRequest) returns (GetEmployeeCredentialsResponse);
  rpc CreateEmployee(CreateEmployeeRequest) returns (CreateEmployeeResponse);
  rpc GetEmployeeById(GetEmployeeByIdRequest) returns (GetEmployeeByIdResponse);
}
