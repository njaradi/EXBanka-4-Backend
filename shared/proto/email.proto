syntax = "proto3";

package email;

option go_package = "github.com/exbanka/backend/shared/pb/email";

message SendActivationEmailRequest {
  string email           = 1;
  string first_name      = 2;
  string activation_link = 3;
}

message SendActivationEmailResponse {}

message SendPasswordResetEmailRequest {
  string email      = 1;
  string first_name = 2;
  string reset_link = 3;
}
message SendPasswordResetEmailResponse {}

service EmailService {
  rpc SendActivationEmail(SendActivationEmailRequest)           returns (SendActivationEmailResponse);
  rpc SendPasswordResetEmail(SendPasswordResetEmailRequest)     returns (SendPasswordResetEmailResponse);
  // Reuses SendActivationEmailRequest (email + first_name); activation_link left empty.
  rpc SendPasswordConfirmationEmail(SendActivationEmailRequest) returns (SendActivationEmailResponse);
}
