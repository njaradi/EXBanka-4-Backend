syntax = "proto3";

package email;

option go_package = "github.com/RAF-SI-2025/EXBanka-4-Backend/shared/pb/email";

message SendActivationEmailRequest {
  string email           = 1;
  string first_name      = 2;
  string activation_link = 3;
}

message SendActivationEmailResponse {}

message SendPasswordResetEmailRequest {
  string email      = 1;
  string first_name = 2;
  string reset_link = 3;
}
message SendPasswordResetEmailResponse {}

message SendAccountCreatedEmailRequest {
  string email          = 1;
  string first_name     = 2;
  string account_name   = 3;
  string account_number = 4;
  string currency_code  = 5;
}

message SendAccountCreatedEmailResponse {}

message SendCardConfirmationEmailRequest {
  string email            = 1;
  string first_name       = 2;
  string confirmation_code = 3;
}
message SendCardConfirmationEmailResponse {}

message SendLoanLatePaymentEmailRequest {
  string email       = 1;
  string first_name  = 2;
  string loan_number = 3;
  double amount_due  = 4;
  string currency    = 5;
  int32  retry_count = 6;
}
message SendLoanLatePaymentEmailResponse {}

service EmailService {
  rpc SendActivationEmail(SendActivationEmailRequest)                 returns (SendActivationEmailResponse);
  rpc SendPasswordResetEmail(SendPasswordResetEmailRequest)           returns (SendPasswordResetEmailResponse);
  // Reuses SendActivationEmailRequest (email + first_name); activation_link left empty.
  rpc SendPasswordConfirmationEmail(SendActivationEmailRequest)       returns (SendActivationEmailResponse);
  rpc SendAccountCreatedEmail(SendAccountCreatedEmailRequest)         returns (SendAccountCreatedEmailResponse);
  rpc SendCardConfirmationEmail(SendCardConfirmationEmailRequest)     returns (SendCardConfirmationEmailResponse);
  rpc SendLoanLatePaymentEmail(SendLoanLatePaymentEmailRequest)       returns (SendLoanLatePaymentEmailResponse);
}
